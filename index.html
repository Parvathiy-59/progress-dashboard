<!DOCTYPE html>
<html>
<head>
    <title>StudyHub</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-container">
    <div class="login-box">
        <h2>StudyHub Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- MAIN MENU -->
<div id="mainMenu" style="display:none;">

    <div class="navbar">
        <h2>StudyHub</h2>
        <div>
            <a href="#" onclick="showPage('dashboard')">Dashboard</a>
            <a href="#" onclick="showPage('tasks')">Tasks</a>
            <a href="#" onclick="showPage('analytics')">Analytics</a>
            <a href="#" onclick="showPage('settings')">Settings</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>

    <div class="container">

        <!-- DASHBOARD -->
        <div id="dashboard" class="page">
            <div class="card">
                <h3>Welcome to StudyHub 🚀</h3>
                <p>Your productivity dashboard</p>
            </div>
        </div>

        <!-- TASKS -->
        <div id="tasks" class="page" style="display:none;">
            <div class="card">
                <h3>Tasks</h3>
                <p>Manage your tasks here</p>
            </div>
        </div>

        <!-- ANALYTICS -->
        <div id="analytics" class="page" style="display:none;">
            <div class="card">
                <h3>Analytics</h3>
                <p>View performance</p>
            </div>
        </div>

        <!-- SETTINGS -->
        <div id="settings" class="page" style="display:none;">
            <div class="card">
                <h3>Settings</h3>
                <p>Customize your app</p>
            </div>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
