<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudyHub</title>

<link rel="stylesheet" href="styles.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="center-box">
    <h2>StudyHub Login</h2>
    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

    <!-- NAVBAR -->
    <nav>
        <h2>StudyHub</h2>
        <ul>
            <li onclick="showPage('dashboard')">Dashboard</li>
            <li onclick="showPage('tasks')">Tasks</li>
            <li onclick="showPage('upload')">Upload</li>
            <li onclick="showPage('profile')">Profile</li>
            <li onclick="logout()">Logout</li>
        </ul>
    </nav>

    <!-- PAGES -->

    <div id="dashboard" class="page">
        <h2>Dashboard</h2>
        <div class="card">
            <h3>Focus Timer</h3>
            <div id="timer">25:00</div>
            <button onclick="startTimer()">Start</button>
            <button onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <div id="tasks" class="page" style="display:none;">
        <h2>Tasks</h2>
        <input type="text" id="taskInput" placeholder="Add task">
        <button onclick="addTask()">Add</button>
        <div id="taskList"></div>
    </div>

    <div id="upload" class="page" style="display:none;">
        <h2>File Upload</h2>
        <input type="file" id="fileUpload" multiple>
        <ul id="fileList"></ul>
    </div>

    <div id="profile" class="page" style="display:none;">
        <h2>Profile</h2>
        <p>Welcome to StudyHub 🚀</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
