<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySprint Dashboard</title>

    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <h2>⚡ StudySprint</h2>
</aside>

<!-- MAIN -->
<main class="main">

    <!-- HEADER -->
    <header class="header">
        <h1>Welcome 👋</h1>

        <div class="profile">
            <input type="text" id="username" value="Alex Johnson">
            <input type="file" id="profilePic" hidden>
            <img id="avatar" src="https://via.placeholder.com/40">
        </div>
    </header>

    <!-- GRID -->
    <div class="grid">

        <!-- TIMER -->
        <div class="card">
            <h3>Focus Timer</h3>
            <div id="timer">25:00</div>
            <button onclick="startTimer()">Start</button>
            <button onclick="resetTimer()">Reset</button>
        </div>

        <!-- TASKS -->
        <div class="card">
            <h3>Tasks</h3>

            <input type="text" id="taskInput" placeholder="Enter task">
            <button onclick="addTask()">Add Task</button>

            <div id="taskList"></div>
        </div>

        <!-- FILE UPLOAD -->
        <div class="card">
            <h3>Upload Files</h3>
            <input type="file" id="fileUpload" multiple>
            <ul id="fileList"></ul>
        </div>

    </div>

</main>

<script src="script.js"></script>
<script>
lucide.createIcons();
</script>

</body>
</html>
